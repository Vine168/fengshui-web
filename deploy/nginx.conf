# ─────────────────────────────────────────────────────────────
# Nginx config for fengshui-web (Production)
# Place this file at: /etc/nginx/sites-available/fengshui-web
# Then run:
#   sudo ln -s /etc/nginx/sites-available/fengshui-web /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    root /var/www/fengshui-web;
    index index.html;

    # ── SPA routing: all paths fall back to index.html ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets aggressively ────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}

