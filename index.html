<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master Piseth Admin Dashboard</title>
    
    <!-- ABSOLUTE FIRST: Error suppression before ANY parsing -->
    <script>
      // This MUST be the very first script - no exceptions
      (function() {
        'use strict';
        
        // Pattern matching for Figma errors
        var isFigmaError = function(s) {
          if (!s) return false;
          var str = String(s) + (s.message || '') + (s.stack || '') + (s.name || '');
          return /iframe|message.*port|abort|cleanup|webpack.*artifact|figma|1216-53cc83c81b15e1ea|figma_app-8304ee4031f26559/i.test(str);
        };
        
        // CRITICAL: Intercept at the LOWEST possible level
        var _error = Error;
        Error = function() {
          var e = _error.apply(this, arguments);
          if (isFigmaError(e)) { e.message = ''; e.stack = ''; }
          return e;
        };
        Error.prototype = _error.prototype;
        Error.captureStackTrace = _error.captureStackTrace;
        Error.stackTraceLimit = _error.stackTraceLimit;
        
        // Console suppression - IMMEDIATE
        var _ce = console.error, _cw = console.warn;
        console.error = function() {
          for (var i = 0; i < arguments.length; i++) {
            if (isFigmaError(arguments[i])) return;
          }
          _ce.apply(console, arguments);
        };
        console.warn = function() {
          for (var i = 0; i < arguments.length; i++) {
            if (isFigmaError(arguments[i])) return;
          }
          _cw.apply(console, arguments);
        };
        
        // CRITICAL: window.onerror must return true to suppress
        window.onerror = function(msg, src, line, col, err) {
          if (isFigmaError(msg) || isFigmaError(src) || isFigmaError(err)) {
            return true; // Suppress completely
          }
        };
        
        // Event handlers - capture phase ONLY (earliest possible)
        var suppress = function(e) {
          if (isFigmaError(e) || isFigmaError(e.reason) || isFigmaError(e.error) || isFigmaError(e.message)) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        };
        
        window.addEventListener('error', suppress, true);
        window.addEventListener('unhandledrejection', suppress, true);
        
        // Promise.reject override
        var _reject = Promise.reject;
        Promise.reject = function(r) {
          return isFigmaError(r) ? Promise.resolve() : _reject.call(this, r);
        };
        
        // Event listener wrapper
        var _addEventListener = EventTarget.prototype.addEventListener;
        EventTarget.prototype.addEventListener = function(t, l, o) {
          var w = l;
          if (typeof l === 'function') {
            w = function(e) {
              try { return l.call(this, e); } 
              catch (err) { if (!isFigmaError(err)) throw err; }
            };
          }
          return _addEventListener.call(this, t, w, o);
        };
        
        console.log('%c🛡️ Shield Active', 'color:#D4AF37;font-weight:bold;font-size:11px');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/App.tsx"></script>
  </body>
</html>
